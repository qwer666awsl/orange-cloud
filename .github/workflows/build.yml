name: Build iOS (Unsigned, Pro Unlocked)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/ios/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/ios/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Orange Cloud (Unsigned)
    runs-on: macos-latest

    defaults:
      run:
        working-directory: apps/ios/Orange Cloud

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Orange Cloud (Release, unsigned, Pro unlocked)
        run: |
          xcodebuild \
            -project "Orange Cloud.xcodeproj" \
            -scheme "Orange Cloud" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS="$(inherited) OPENSOURCE_UNLOCKED" \
            clean build

      - name: Package unsigned .ipa
        if: success()
        run: |
          mkdir -p build/Payload
          cp -R build/Release-iphoneos/Orange Cloud.app build/Payload/
          cd build
          zip -r ../OrangeCloud-iOS-unsigned.ipa Payload/Orange Cloud.app
          cd ..

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrangeCloud-iOS-unsigned
          path: apps/ios/Orange Cloud/OrangeCloud-iOS-unsigned.ipa
          compression-level: 9
