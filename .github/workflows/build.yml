name: Build iOS IPA (Unsigned - Official Unlocked Pro)

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    # 1. 必须使用搭载了最新 Xcode 编译环境的 macOS 15 镜像
    runs-on: macos-15

    steps:
    # 2. 拉取克隆的纯净仓库代码
    - name: Checkout repository
      uses: actions/checkout@v4

    # 3. 核心：在云端强制切换并启用最新的 Xcode 编译链
    - name: Select Latest Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
        xcodebuild -version

    # 4. 准备 Node.js 环境
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # 5. 自动安装依赖
    - name: Install Pods
      run: |
        PODFILE_PATH=$(find . -name "Podfile")
        if [ ! -z "$PODFILE_PATH" ]; then
          POD_DIR=$(dirname "$PODFILE_PATH")
          echo "Found Podfile in $POD_DIR, installing..."
          cd "$POD_DIR" && pod install
        else
          echo "No Podfile found, skipping..."
        fi

    # 6. 核心编译（使用最新编译器 + 官方免破解解锁参数）
    - name: Build Xcode Project (Official Spec)
      run: |
        mkdir -p $GITHUB_WORKSPACE/build-output
        
        xcodebuild -project "apps/ios/Orange Cloud/Orange Cloud.xcodeproj" \
                   -scheme "Orange Cloud" \
                   -configuration Release \
                   -sdk iphoneos \
                   clean build \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   APPLICATION_EXTENSION_API_ONLY=YES \
                   SWIFT_ACTIVE_COMPILATION_CONDITIONS="OPENSOURCE_UNLOCKED" \
                   CONFIGURATION_BUILD_DIR=$GITHUB_WORKSPACE/build-output

    # 7. 将编译出的 App 封装为无签名 .ipa 格式
    - name: Package .app into .ipa
      run: |
        mkdir -p $GITHUB_WORKSPACE/Payload
        APP_PATH=$(find $GITHUB_WORKSPACE/build-output -name "*.app" -maxdepth 1 | head -n 1)
        if [ -z "$APP_PATH" ]; then
          APP_PATH=$(find $GITHUB_WORKSPACE/build-output -name "*.app" | head -n 1)
        fi
        echo "Found App to Package: $APP_PATH"
        cp -r "$APP_PATH" $GITHUB_WORKSPACE/Payload/
        cd $GITHUB_WORKSPACE
        zip -r orange-cloud-unsigned.ipa Payload

    # 8. 上传最终解锁了 Pro 的无签名 ipa 包
    - name: Upload IPA to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: orange-cloud-unlocked-ipa
        path: orange-cloud-unsigned.ipa
